<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #0f1419;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .info {
      background: #f7f9f9;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .info-label {
      font-size: 12px;
      color: #536471;
      margin-bottom: 4px;
    }
    .info-value {
      font-weight: 700;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9999px;
      background: #1d9bf0;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover {
      background: #1a8cd8;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #536471;
      text-align: center;
    }
    .error {
      color: #f4212e;
    }
  </style>
</head>
<body>
  <h1>Follow As</h1>
  <div class="info">
    <div class="info-label">サブアカウント</div>
    <div class="info-value" id="account-name">読み込み中...</div>
  </div>
  <div class="info">
    <div class="info-label">フォロー中</div>
    <div class="info-value" id="following-count">-</div>
  </div>
  <button class="btn" id="refresh-btn">フォローリストを再取得</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
